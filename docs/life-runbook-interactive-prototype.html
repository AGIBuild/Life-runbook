  function renderProfileSummary() {
    const profileAssetSummary = document.getElementById("profileAssetSummary");
    const guardianAssetSummary = document.getElementById("guardianAssetSummary");
    const vaultEntrySummary = document.getElementById("vaultEntrySummary");
    const vaultEntryStatus = document.getElementById("vaultEntryStatus");
    const totalVaultAssets = state.vaultItems.length + state.vaultPasswords.length;
    const openedCount = getVaultOpenedCount();
    const releaseMeta = getVaultReleaseMeta();
    state.contacts.forEach(normalizeGuardianContact);
    const enabledCount = state.contacts.filter(isGuardianEnabled).length;
    const verifiedCount = state.contacts.filter(item => isGuardianEnabled(item) && item.status === "verified").length;
    if (profileAssetSummary) profileAssetSummary.innerText = `${enabledCount}/${state.contacts.length} 位守护人启用 · 保险柜 ${totalVaultAssets} 项`;
    if (guardianAssetSummary) guardianAssetSummary.innerText = `${verifiedCount}/${enabledCount || 0} 已应允 · 可接收平安信`;
    if (vaultEntrySummary) vaultEntrySummary.innerText = `${totalVaultAssets} 项 · ${openedCount} 项按约开放 · ${releaseMeta.label}`;
    if (vaultEntryStatus) {
      vaultEntryStatus.className = `status-pill ${releaseMeta.className}`;
      vaultEntryStatus.innerText = releaseMeta.detail;
    }
  }

  function renderContacts() {
    const list = document.getElementById("contactList");
    if (list) list.innerHTML = renderContactRows();
  }

  function renderContactRows() {
    state.contacts.forEach(normalizeGuardianContact);
    return state.contacts.map(c => `
      <div class="control-card" onclick="openGuardianEditSheet('${c.id}')">
        <div>
          <strong>${c.name} (${c.relation})</strong>
          <span>${c.phone} · ${c.permission}</span>
        </div>
        <span class="status-pill ${getContactStatusClass(c)}">${getContactStatusLabel(c)}</span>
      </div>
    `).join("");
  }

  function getContactStatusClass(contact) {
    if (!isGuardianEnabled(contact)) return "status-muted";
    return contact.status === "verified" ? "status-success" : "status-warning";
  }

  function getContactStatusLabel(contact) {
    if (!isGuardianEnabled(contact)) return "已停用";
    return contact.status === "verified" ? "已守候" : "待应允";
  }

  function findGuardianStarForContact(contact, previousName = contact?.name) {
    if (!contact) return null;
    return state.guardianStars.find(star => star.id === contact.starId)
      || state.guardianStars.find(star => star.role === "guardian" && (star.name === previousName || star.name === contact.name));
  }

  function ensureGuardianStarForContact(contact, previousName = contact?.name) {
    if (!contact) return null;
    let star = findGuardianStarForContact(contact, previousName);
    if (!star) {
      star = {
        id: `guardian-${contact.id}`,
        name: contact.name,
        relation: contact.relation,
        role: "guardian",
        phone: contact.phone,
        backupContact: contact.backupContact || "",
        contactNote: contact.contactNote || "",
        status: "normal",
        activity: "颜色",
        wish: "守护人",
        detail: "状态",
        canCall: true,
        canMessage: true,
        canViewVault: false,
        vaultHint: "只接收平安信和状态"
      };
      state.guardianStars.push(star);
      if (!state.guardianLinks.some(link => link.source === "self" && link.target === star.id)) {
        state.guardianLinks.push({ source: "self", target: star.id });
      }
    }
    contact.starId = star.id;
    star.name = contact.name;
    star.relation = contact.relation;
    star.phone = contact.phone;
    star.backupContact = contact.backupContact || "";
    star.contactNote = contact.contactNote || "";
    star.canCall = Boolean(contact.phone);
    star.canMessage = isGuardianEnabled(contact);
    star.detail = getContactPermissionLabel(contact);
    return star;
  }

  function openContactManageSheet() {
    showSheet(`
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">守护人</h3>
      <div class="sheet-scroll-list">
        ${renderContactRows() || '<p class="sheet-subtitle" style="margin-bottom:0;">还没有守护人</p>'}
      </div>
      <button class="primary-btn" style="margin-top:14px;" onclick="openContactSheet()">添加守护人</button>
      <button class="secondary-btn" style="margin-top:8px;" onclick="closeSheet()">关闭</button>
    `);
  }

  function contactFormHtml(title, description, actionName, primaryLabel) {
    return `
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">${title}</h3>
      <p class="sheet-subtitle">${description}</p>
      <div class="field-group">
        <label>守护人姓名</label>
        <input class="form-control" id="newContactName" type="text" placeholder="例如：林挚友">
      </div>
      <div class="field-group">
        <label>联系电话</label>
        <input class="form-control" id="newContactPhone" type="text" placeholder="手机号码">
      </div>
      <div class="field-group">
        <label>关系</label>
        <select class="form-control" id="newContactRelation">
          <option value="配偶">配偶</option>
          <option value="父母">父母</option>
          <option value="挚友">挚友</option>
          <option value="合伙人">工作合伙人</option>
        </select>
      </div>
      <button class="primary-btn" style="margin-top:6px;" onclick="${actionName}()">${primaryLabel}</button>
      <button class="secondary-btn" style="margin-top:8px;" onclick="closeSheet()">取消</button>
    `;
  }

  function openContactSheet() {
    showSheet(contactFormHtml(
      "添加守护人",
      "对方应允后，可在你久未报平安时收到平安信。",
      "addContact",
      "送出守护邀请"
    ));
  }

  function openQuickContactSheet() {
    showSheet(contactFormHtml(
      "添加守护人",
      "添加后会自动选为本次守护的守护人，不需要离开当前设置流程。",
      "addContactFromCreate",
      "添加并选中"
    ));
  }

  function readContactDraft() {
    const name = document.getElementById("newContactName").value.trim();
    const phone = document.getElementById("newContactPhone").value.trim();
    const relation = document.getElementById("newContactRelation").value;
    if (!name || !phone) {
      showToast("请完整填写守护人信息");
      return null;
    }

    return { name, phone, relation };
  }

  function createContact(draft) {
    const contact = {
      id: `c${Date.now()}`,
      name: draft.name,
      relation: draft.relation,
      phone: draft.phone,
      status: "pending",
      enabled: true,
      permissionMode: "message",
      permission: "只接收平安信",
      backupContact: "",
      contactNote: ""
    };
    state.contacts.push(contact);
    ensureGuardianStarForContact(contact);
    state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 已添加守护人 ${contact.name}`);
    return contact;
  }

  function addContact() {
    const draft = readContactDraft();
    if (!draft) return;

    createContact(draft);
    closeSheet();
    showToast("守护邀请已送出");
    renderAll();
  }

  function addContactFromCreate() {
    const draft = readContactDraft();
    if (!draft) return;

    const contact = createContact(draft);
    closeSheet();
    renderAll();
    const selection = [...new Set([...readGuardianSelection(), contact.name])];
    renderGuardianPicker(selection, readPrimaryGuardian() || contact.name);
    showToast("已添加并选中守护人");
  }

  function openContactDetail(id) {
    openGuardianEditSheet(id);
  }

  function openGuardianEditSheet(id) {
    const contact = state.contacts.find(item => item.id === id);
    if (!contact) return;
    normalizeGuardianContact(contact);
    const deleteButton = contact.id === "c1" ? "" : `<button class="danger-btn" style="margin-top:8px;" onclick="deleteContact('${contact.id}')">移除守护人</button>`;
    const relationOptions = [...new Set([contact.relation, "妻子", "配偶", "父母", "挚友", "合伙人", "亲人"].filter(Boolean))].map(relation => `
      <option value="${relation}" ${contact.relation === relation ? "selected" : ""}>${relation}</option>
    `).join("");
    const statusOptions = [
      { value: "verified", label: "已应允" },
      { value: "pending", label: "待应允" }
    ].map(option => `<option value="${option.value}" ${contact.status === option.value ? "selected" : ""}>${option.label}</option>`).join("");
    const permissionMode = getContactPermissionMode(contact);

    showSheet(`
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">编辑守护人</h3>
      <div class="field-group">
        <label for="guardianEditName">姓名</label>
        <input class="form-control" id="guardianEditName" type="text" value="${escapeHtml(contact.name)}" placeholder="守护人姓名">
      </div>
      <div class="field-group">
        <label for="guardianEditPhone">电话</label>
        <input class="form-control" id="guardianEditPhone" type="text" value="${escapeHtml(contact.phone)}" placeholder="手机号或电话">
      </div>
      <div class="field-group">
        <label for="guardianEditRelation">关系</label>
        <select class="form-control" id="guardianEditRelation">${relationOptions}</select>
      </div>
      <div class="field-group">
        <label for="guardianEditBackup">备用联系方式</label>
        <input class="form-control" id="guardianEditBackup" type="text" value="${escapeHtml(contact.backupContact || "")}" placeholder="微信、邮箱、座机等">
      </div>
      <div class="field-group">
        <label for="guardianEditNote">备注</label>
        <textarea class="form-control" id="guardianEditNote" placeholder="例如：优先电话，未接再发微信。">${escapeHtml(contact.contactNote || "")}</textarea>
      </div>
      <div class="field-group">
        <label for="guardianEditStatus">应允状态</label>
        <select class="form-control" id="guardianEditStatus">${statusOptions}</select>
      </div>
      <div class="field-group">
        <label for="guardianEditPermission">资料权限</label>
        <select class="form-control" id="guardianEditPermission">
          <option value="message" ${permissionMode === "message" ? "selected" : ""}>只接收平安信</option>
          <option value="vault" ${permissionMode === "vault" ? "selected" : ""}>首要守护人，可按约查看保险柜</option>
        </select>
      </div>
      <label class="control-card is-toggle">
        <input id="guardianEditEnabled" type="checkbox" ${isGuardianEnabled(contact) ? "checked" : ""}>
        <span><strong>可守护</strong><span>关闭后不接收平安信，也不会参与当前守护</span></span>
      </label>
      <button class="primary-btn" style="margin-top:12px;" onclick="saveGuardianEdit('${contact.id}')">保存守护人</button>
      ${deleteButton}
      <button class="secondary-btn" style="margin-top:8px;" onclick="openContactManageSheet()">返回列表</button>
    `);
  }

  function saveGuardianEdit(id) {
    const contact = state.contacts.find(item => item.id === id);
    if (!contact) return;
    const previousName = contact.name;
    const name = document.getElementById("guardianEditName")?.value.trim();
    const phone = document.getElementById("guardianEditPhone")?.value.trim();
    if (!name || !phone) {
      showToast("请完整填写守护人信息");
      return;
    }

    contact.name = name;
    contact.phone = phone;
    contact.relation = document.getElementById("guardianEditRelation")?.value || contact.relation;
    contact.backupContact = document.getElementById("guardianEditBackup")?.value.trim() || "";
    contact.contactNote = document.getElementById("guardianEditNote")?.value.trim() || "";
    contact.status = document.getElementById("guardianEditStatus")?.value || "pending";
    contact.enabled = Boolean(document.getElementById("guardianEditEnabled")?.checked);
    contact.permissionMode = contact.enabled ? (document.getElementById("guardianEditPermission")?.value || "message") : "message";
    normalizeGuardianContact(contact);
    syncEditedGuardianToRuntime(contact, previousName);
    state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 已更新守护人 ${contact.name}`);
    renderAll();
    showToast("守护人已保存");
    openContactManageSheet();
  }

  function syncEditedGuardianToRuntime(contact, previousName) {
    ensureGuardianStarForContact(contact, previousName);

    if (contact.enabled && contact.permissionMode === "vault") {
      state.contacts.forEach(item => {
        if (item.id !== contact.id && getContactPermissionMode(item) === "vault") {
          item.permissionMode = "message";
          item.permission = getContactPermissionLabel(item);
        }
      });
    }

    if (state.currentRunbook) {
      const renamedSelection = (state.currentRunbook.guardianSelection || [])
        .map(name => name === previousName ? contact.name : name)
        .filter((name, index, list) => list.indexOf(name) === index);
      state.currentRunbook.guardianSelection = renamedSelection.filter(name => {
        const item = state.contacts.find(candidate => candidate.name === name);
        return item && isGuardianEnabled(item);
      });

      if (state.currentRunbook.contact === previousName) {
        state.currentRunbook.contact = contact.enabled ? contact.name : state.currentRunbook.guardianSelection[0] || "";
      }

      if (contact.enabled && contact.permissionMode === "vault") {
        if (!state.currentRunbook.guardianSelection.includes(contact.name)) {
          state.currentRunbook.guardianSelection.push(contact.name);
        }
        state.currentRunbook.primaryGuardian = contact.name;
        state.currentRunbook.contact = contact.name;
      } else if (state.currentRunbook.primaryGuardian === previousName || state.currentRunbook.primaryGuardian === contact.name) {
        const nextPrimary = state.contacts.find(item => isGuardianEnabled(item) && getContactPermissionMode(item) === "vault");
        state.currentRunbook.primaryGuardian = nextPrimary?.name || "";
      }
      ensureRunbookGuardianConsistency(state.currentRunbook);
    }

    syncPrimaryGuardianVaultPermission(state.currentRunbook?.primaryGuardian || (contact.enabled && contact.permissionMode === "vault" ? contact.name : ""));
    state.starMapRendered = false;
  }

  function verifyContact(id) {
    const contact = state.contacts.find(item => item.id === id);
    if (contact) {
      contact.status = "verified";
      normalizeGuardianContact(contact);
      syncEditedGuardianToRuntime(contact, contact.name);
      state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 守护人 ${contact.name} 已应允`);
    }
    closeSheet();
    showToast("守护人已应允");
    renderAll();
  }

  function deleteContact(id) {
    if (id === "c1") return;
    const contact = state.contacts.find(item => item.id === id);
    state.contacts = state.contacts.filter(item => item.id !== id);
    if (contact) {
      const star = findGuardianStarForContact(contact);
      if (star) {
        state.guardianStars = state.guardianStars.filter(item => item.id !== star.id);
        state.guardianLinks = state.guardianLinks.filter(link => link.source !== star.id && link.target !== star.id);
      }
      if (state.currentRunbook) {
        state.currentRunbook.guardianSelection = (state.currentRunbook.guardianSelection || []).filter(name => name !== contact.name);
        if (state.currentRunbook.primaryGuardian === contact.name) {
          const nextPrimary = state.contacts.find(item => isGuardianEnabled(item) && getContactPermissionMode(item) === "vault");
          state.currentRunbook.primaryGuardian = nextPrimary?.name || "";
        }
        ensureRunbookGuardianConsistency(state.currentRunbook);
      }
    }
    syncPrimaryGuardianVaultPermission(state.currentRunbook?.primaryGuardian || "");
    state.starMapRendered = false;
    closeSheet();
    showToast("守护人已移除");
    renderAll();
  }

  /* ------------------- Render Vault ------------------- */
  function getSafeVaultLimits(plan = state.safeVaultPlan) {
    if (plan === "paid") {
      return {
        label: "付费用户",
        description: "资料和密码无限存放",
        documents: Infinity,
        passwords: Infinity,
        unlimited: true
      };
    }

    return {
      label: "免费用户",
      description: "1 份资料 · 3 个密码",
      documents: 1,
      passwords: 3,
      unlimited: false
    };
  }

  function getSafeVaultUsage() {
    return {
      documents: state.vaultItems.length,
      passwords: state.vaultPasswords.length
    };
  }

  function getSafeVaultCapacityText(kind) {
    const limits = getSafeVaultLimits();
    const usage = getSafeVaultUsage();
    const limit = kind === "password" ? limits.passwords : limits.documents;
    const used = kind === "password" ? usage.passwords : usage.documents;
    return limits.unlimited ? `${used}/无限` : `${used}/${limit}`;
  }

  function canAddVaultAsset(kind) {
    const limits = getSafeVaultLimits();
    if (limits.unlimited) return true;
    const usage = getSafeVaultUsage();
    return kind === "password" ? usage.passwords < limits.passwords : usage.documents < limits.documents;
  }

  function getVaultOpenedCount() {
    return [...state.vaultItems, ...state.vaultPasswords].filter(item => item.allowRelease).length;
  }

  function renderVaultAssetCard(item, kind) {
    const isPassword = kind === "password";
    const subtitle = isPassword ? item.account : item.type;
    const openAction = isPassword ? `openVaultPasswordSheet('${item.id}')` : `openVaultItemSheet('${item.id}')`;
    const isReleased = state.vaultReleaseStatus === "released" && item.allowRelease;
    const permissionText = item.allowRelease ? (isReleased ? "已开放" : "可按约开放") : "仅本人可见";
    const permissionLabel = item.allowRelease ? (isReleased ? "可见" : "按约") : "封存";
    const permissionClass = item.allowRelease ? (isReleased ? "status-danger" : "status-success") : "status-muted";
    return `
      <div class="vault-asset-card" onclick="${openAction}">
        <div>
          <strong>${item.title}</strong>
          <span>${isPassword ? "密码" : "资料"} · ${subtitle} · ${permissionText}</span>
        </div>
        <button class="vault-permission-pill ${permissionClass}" onclick="toggleVaultExposure('${item.id}', event, '${kind}')">
          ${permissionLabel}
        </button>
      </div>
    `;
  }

  function renderVaultAssetSection(title, count, rows) {
    return `
      <div class="vault-section-title">
        <strong>${title}</strong>
        <span>${count} 项</span>
      </div>
      ${rows || '<p style="margin:0; padding:12px; color:var(--color-text-secondary); font-size:12px; text-align:center;">暂无内容</p>'}
    `;
  }

  function renderVault() {
    const list = document.getElementById("vaultList");
    if (!list) return;
    const releaseMeta = getVaultReleaseMeta();
    const limits = getSafeVaultLimits();
    const documentRows = state.vaultItems.map(item => renderVaultAssetCard(item, "document")).join("");
    const passwordRows = state.vaultPasswords.map(item => renderVaultAssetCard(item, "password")).join("");
    const openedCount = getVaultOpenedCount();

    list.innerHTML = `
      <div class="vault-console">
        <div class="vault-console-top">
          <div class="vault-orb" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="3"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><path d="M12 14v2"/></svg>
          </div>
          <div class="vault-console-title" style="flex:1;">
            <strong>安全中控台</strong>
            <span>远端加密存储 · ${limits.label}</span>
          </div>
          <button class="vault-console-action" onclick="openVaultManageSheet()">管理</button>
        </div>
        <div class="vault-console-meta">${releaseMeta.label} · ${releaseMeta.detail}</div>
        <div class="vault-metrics">
          <div class="vault-metric">
            <strong>${getSafeVaultCapacityText("document")}</strong>
            <span>资料容量</span>
          </div>
          <div class="vault-metric">
            <strong>${getSafeVaultCapacityText("password")}</strong>
            <span>密码容量</span>
          </div>
          <div class="vault-metric">
            <strong>${openedCount}</strong>
            <span>开放项</span>
          </div>
        </div>
      </div>
      ${renderVaultAssetSection("资料", state.vaultItems.length, documentRows)}
      ${renderVaultAssetSection("密码", state.vaultPasswords.length, passwordRows)}
    `;

    const homeVaultSum = document.getElementById("homeVaultSummary");
    if (homeVaultSum) {
      const selectedCount = [...state.vaultItems, ...state.vaultPasswords].filter(item => item.allowRelease).length;
      homeVaultSum.innerText = `${selectedCount}/${state.vaultItems.length + state.vaultPasswords.length} 项保险柜`;
    }
  }

  function toggleVaultExposure(id, event, kind = "document") {
    event?.stopPropagation();
    const list = kind === "password" ? state.vaultPasswords : state.vaultItems;
    const item = list.find(vaultItem => vaultItem.id === id);
    if (!item) return;
    item.allowRelease = !item.allowRelease;
    state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 已${item.allowRelease ? "开放" : "关闭"}保险柜项：${item.title}`);
    renderAll();
  }

  function toggleSafeVaultPlan(plan) {
    state.safeVaultPlan = plan;
    state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 保险柜账户切换为${getSafeVaultLimits(plan).label}`);
    renderAll();
  }

  function openVaultManageSheet() {
    const limits = getSafeVaultLimits();
    const releaseMeta = getVaultReleaseMeta();
    showSheet(`
      <div class="sheet-handle"></div>
      <h3 style="margin:0 0 8px; font-weight:700; text-align:center;">管理保险柜</h3>
      <div class="status-band" style="margin-bottom:12px;">
        <div>
          <strong>${limits.label}</strong>
          <span>${limits.description} · ${releaseMeta.label}</span>
        </div>
        <span class="status-pill ${releaseMeta.className}">${releaseMeta.detail}</span>
      </div>
      <div class="segmented" style="margin-bottom:12px;">
        <button class="${state.safeVaultPlan === 'free' ? 'active' : ''}" onclick="toggleSafeVaultPlan('free'); closeSheet(); openVaultManageSheet();">免费</button>
        <button class="${state.safeVaultPlan === 'paid' ? 'active' : ''}" onclick="toggleSafeVaultPlan('paid'); closeSheet(); openVaultManageSheet();">付费</button>
      </div>
      <div style="display:grid; gap:8px; text-align:left;">
        <div class="priority-card" onclick="openAddVaultSecretSheet('document')">
          <div>
            <span class="row-title">添加资料</span>
            <span class="row-subtitle">${getSafeVaultCapacityText("document")}</span>
          </div>
        </div>
        <div class="priority-card" onclick="openAddVaultSecretSheet('password')">
          <div>
            <span class="row-title">添加密码</span>
            <span class="row-subtitle">${getSafeVaultCapacityText("password")}</span>
          </div>
        </div>
        <div class="priority-card" onclick="openVaultReleaseRuleSheet()">
          <div>
            <span class="row-title">封存规则</span>
            <span class="row-subtitle">紫色状态持续 15 天后按选择开放</span>
          </div>
        </div>
      </div>
      <button class="primary-btn" style="margin-top:14px;" onclick="closeSheet()">完成</button>
    `);
  }

  function openUpgradeVaultSheet(kind) {
    const label = kind === "password" ? "密码" : "资料";
    showSheet(`
      <div class="sheet-handle"></div>
      <h3 style="margin:0 0 8px; font-weight:700; text-align:center;">升级保险柜</h3>
      <div class="status-band">
        <div>
          <strong>免费用户已达上限</strong>
          <span>免费可添加 1 份资料和 3 个密码</span>
        </div>
        <span class="status-pill status-warning">${label}</span>
      </div>
      <button class="primary-btn" style="margin-top:14px;" onclick="toggleSafeVaultPlan('paid'); closeSheet(); showToast('已切换为付费演示')">切换付费演示</button>
      <button class="secondary-btn" style="margin-top:8px;" onclick="closeSheet()">返回</button>
    `);
  }

  function openAddVaultSecretSheet(kind) {
    if (!canAddVaultAsset(kind)) {
      openUpgradeVaultSheet(kind);
      return;
    }

    const isPassword = kind === "password";
    showSheet(`
      <div class="sheet-handle"></div>
      <h3 style="margin:0 0 8px; font-weight:700; text-align:center;">添加${isPassword ? "密码" : "资料"}</h3>
      <div class="status-band">
        <div>
          <strong>远端加密存储</strong>
          <span>仅保存密文，开放前守护人不可见</span>
        </div>
        <span class="status-pill status-success">加密</span>
      </div>
      <button class="primary-btn" style="margin-top:14px;" onclick="addVaultSecret('${kind}')">添加演示项</button>
      <button class="secondary-btn" style="margin-top:8px;" onclick="closeSheet()">取消</button>
    `);
  }

  function addVaultSecret(kind) {
    if (!canAddVaultAsset(kind)) {
      openUpgradeVaultSheet(kind);
      return;
    }

    if (kind === "password") {

  /* ------------------- Countdown Timer ------------------- */
  function startCountdown() {
    clearInterval(state.countdownInterval);
    updateCountdownDisplay();
    state.countdownInterval = setInterval(() => {
      if (state.runbookStatus === "pending") {
        state.countdownSeconds--;
        if (state.countdownSeconds <= 0) {
          state.countdownSeconds = 0;
          simulateTimeoutTrigger();
        }
        updateCountdownDisplay();
      } else {
        clearInterval(state.countdownInterval);
      }
    }, 1000);
  }

  function formatCountdown(totalSeconds) {
    const safeSeconds = Math.max(0, Number(totalSeconds) || 0);
    const hours = Math.floor(safeSeconds / 3600);
    const minutes = Math.floor((safeSeconds % 3600) / 60);
    const seconds = safeSeconds % 60;
    return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
  }

  function updateCountdownDisplay() {
    const timeString = formatCountdown(state.countdownSeconds);

    const homeCount = document.getElementById("homeCountdown");
    if (homeCount) homeCount.innerText = timeString;
    
    const checkinCount = document.getElementById("checkinCountdown");
    if (checkinCount) checkinCount.innerText = timeString;

    const checkinContact = document.getElementById("checkinContact");
    if (checkinContact && state.currentRunbook) {
      checkinContact.innerText = `${state.currentRunbook.guardianSelection?.length || 1} 位`;
    }
  }

  /* ------------------- Generic Modals & Ultimate Optimizations ------------------- */
  function showSheet(html) {
    document.getElementById("sheetContent").innerHTML = html;
    document.getElementById("sheetMask").classList.add("visible");
  }

  function closeSheet(event) {
    if (event && event.target.id !== "sheetMask") return;
    document.getElementById("sheetMask").classList.remove("visible");
  }

  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.classList.add("visible");
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => toast.classList.remove("visible"), 1800);

    // Auto trigger haptic vibration glow based on toast intent!
    if (message.includes("中断") || message.includes("警告") || message.includes("延时") || message.includes("锁闭")) {
      triggerHaptic("warning");
    } else if (message.includes("注销") || message.includes("删除") || message.includes("断开") || message.includes("异常")) {
      triggerHaptic("error");
    } else {
      triggerHaptic("success");
    }
  }

  // 1. Haptic Feedback Simulation
  function triggerHaptic(type) {
    const ring = document.getElementById("hapticGlowRing");
    if (!ring) return;
    ring.className = "haptic-glow-ring"; // Reset
    void ring.offsetWidth; // Reflow to restart animation
    ring.classList.add(`pulse-${type}`);
  }

  // 2. Progressive Matrix Decryption Animation
  function scrambleDecrypt(elementId, targetText) {
    const el = document.getElementById(elementId);
    if (!el) return;
    const chars = "XYZ!@#$%^&*()_+{}|:<>?-=[]\\;',./~`0123456789";
    let iterations = 0;
    const interval = setInterval(() => {
      el.innerText = targetText
        .split("")
        .map((char, index) => {
          if (char === " ") return " ";
          if (index < iterations) return targetText[index];
          return chars[Math.floor(Math.random() * chars.length)];
        })
        .join("");
      
      iterations += 2.5; // Scramble speed factor
      if (iterations >= targetText.length) {
        el.innerText = targetText;
        clearInterval(interval);
      }
    }, 20);
  }

  // Initialize
  renderAll();
  setInterval(updateTime, 15000);
