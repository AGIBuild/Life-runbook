<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>LifeRunbook Interactive Prototype</title>
<style>
  :root {
    --color-primary: #0A84FF; /* Deep cybernetic blue */
    --color-primary-soft: rgba(10, 132, 255, 0.08);
    --color-success: #30D158; /* Pure energetic green */
    --color-success-soft: rgba(48, 209, 88, 0.08);
    --color-warning: #FF9F0A; /* Radiant amber */
    --color-warning-soft: rgba(255, 159, 10, 0.08);
    --color-danger: #FF453A; /* Premium warning crimson */
    --color-danger-soft: rgba(255, 69, 58, 0.08);
    
    /* Luxury slate background layers */
    --color-bg: #090A0F; /* Midnight dark canvas */
    --color-bg-panel: #12131A; /* Slick card panel */
    --color-card: #1A1B26; /* Elevated micro-card */
    --color-text: #F2F2F7; /* Pure slate label */
    --color-text-secondary: #8E8E93; /* Muted descriptor label */
    --color-text-muted: #48484A; /* Dark border and placeholder */
    --color-border: rgba(255, 255, 255, 0.05); /* Hairline cyber divider */
    --color-border-glow: rgba(10, 132, 255, 0.25);
    
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    
    --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.45);
    --shadow-phone: 0 35px 100px rgba(0, 0, 0, 0.85);
    --page-padding: 18px;
    --tab-height: 64px;
    --transition-spring: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);

    --font-size-xxs: 10px;
    --font-size-xs: 11px;
    --font-size-sm: 12px;
    --font-size-body: 13px;
    --font-size-label: 12px;
    --font-size-title: 16px;
    --line-height-tight: 1.25;
    --line-height-body: 1.45;
    --line-height-relaxed: 1.55;
    --font-weight-label: 650;
    --font-weight-title: 760;
    --control-height: 42px;
    --control-padding-x: 13px;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 30%, #111827 0%, #030712 100%);
    color: var(--color-text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
    font-size: var(--font-size-body);
    line-height: var(--line-height-body);
    letter-spacing: -0.015em;
  }

  button, input, select, textarea {
    font: inherit;
    outline: none;
  }

  /* Side Simulator Dashboard Panel */
  .demo-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(320px, 380px) 1fr;
    gap: 48px;
    align-items: center;
    padding: 40px clamp(24px, 6vw, 80px);
  }

  .demo-sidebar {
    max-width: 380px;
  }

  .demo-sidebar h1 {
    margin: 0 0 8px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: #FFFFFF;
    background: linear-gradient(135deg, #FFF 30%, #0A84FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .demo-sidebar p {
    margin: 0 0 24px;
    color: #94A3B8;
    font-size: 13px;
    line-height: 1.6;
  }

  .demo-panel {
    padding: 14px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-lg);
    background: rgba(18, 19, 26, 0.8);
    box-shadow: var(--shadow-card);
    backdrop-filter: blur(30px);
  }

  .demo-step {
    width: 100%;
    min-height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    margin-bottom: 6px;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    background: transparent;
    color: #94A3B8;
    text-align: left;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s;
  }

  .demo-step:last-child {
    margin-bottom: 0;
  }

  .demo-step:hover,
  .demo-step.active {
    background: rgba(255, 255, 255, 0.03);
    border-color: rgba(10, 132, 255, 0.15);
    color: #FFFFFF;
  }

  .demo-step:active {
    transform: scale(0.98);
  }

  .step-index {
    width: 24px;
    height: 24px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.05);
    color: var(--color-primary);
    font-weight: 700;
    font-size: 10px;
    transition: background 0.2s, color 0.2s;
  }

  .demo-step.active .step-index {
    background: var(--color-primary);
    color: #FFFFFF;
    box-shadow: 0 0 10px rgba(10, 132, 255, 0.4);
  }

  .demo-step strong {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: 1px;
  }

  .demo-step span:last-child {
    display: block;
    color: #64748B;
    font-size: 11px;
  }

  /* Premium Phone Chassis */
  .phone {
    width: 390px;
    height: 844px;
    margin: 0 auto;
    border: 10px solid #1F2029;
    border-radius: 44px;
    background: #000000;
    box-shadow: var(--shadow-phone);
    position: relative;
    overflow: hidden;
  }

  /* Device camera island shape */
  .phone::before {
    content: "";
    position: absolute;
    top: 9px;
    left: 50%;
    width: 108px;
    height: 26px;
    border-radius: 999px;
    transform: translateX(-50%);
    background: #000000;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(255, 255, 255, 0.05);
  }

  /* Pure dark screen canvas */
  .screen {
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 34px;
    background: var(--color-bg);
    position: relative;
  }

  .status-bar {
    height: 44px;
    padding: 12px 24px 0;
    display: flex;
    justify-content: space-between;
    color: var(--color-text);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: -0.02em;
    z-index: 90;
    position: relative;
  }

  .top-nav {
    height: 44px;
    padding: 0 var(--page-padding);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 80;
  }

  .top-nav-title {
    font-size: 15.5px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--color-text);
    opacity: 0.95;
  }

  .nav-icon {
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    border: 1px solid var(--color-border);
    border-radius: 50%;
    background: var(--color-bg-panel);
    color: var(--color-text);
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }

  .nav-icon:active {
    transform: scale(0.92);
    background: var(--color-card);
  }

  .nav-icon svg {
    width: 16px;
    height: 16px;
    stroke-width: 2.2;
  }

  .app-content {
    height: calc(100% - 88px);
    overflow: hidden;
    position: relative;
  }

  /* Silk smooth sliding page transitions */
  .page {
    position: absolute;
    inset: 0;
    opacity: 0;
    visibility: hidden;
    z-index: 0;
    transform: translateY(12px) scale(0.99);
    pointer-events: none;
    display: flex;
    flex-direction: column;
    padding: 4px var(--page-padding) calc(var(--tab-height) + 12px);
    overflow-y: auto;
    scrollbar-width: none;
    transition: var(--transition-spring);
  }

  .page::-webkit-scrollbar {
    display: none;
  }

  .page.active {
    opacity: 1;
    visibility: visible;
    z-index: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .page:not(.active),
  .page:not(.active) * {
    pointer-events: none !important;
  }

  .page-body {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Cards - Flat dark aesthetics with hairline dividers */
  .card {
    background: var(--color-bg-panel);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.25s, box-shadow 0.25s;
  }

  .card.interactive {
    cursor: pointer;
  }

  .card.interactive:active {
    transform: scale(0.98);
    border-color: rgba(255, 255, 255, 0.1);
  }

  .card.pad {
    padding: 16px;
  }

  /* High-end instrument card design */
  .hero-card {
    padding: 22px 20px;
    border-radius: var(--radius-lg);
    background: linear-gradient(180deg, var(--color-bg-panel) 0%, rgba(18, 19, 26, 0.75) 100%);
    background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px), radial-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px);
    background-size: 16px 16px;
    background-position: 0 0, 8px 8px;
    border: 1px solid var(--color-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.5s ease, border-color 0.5s ease;
  }

  /* Status specific glowing shadows */
  .hero-card.status-empty {
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.02);
  }
  .hero-card.status-active {
    box-shadow: 0 12px 40px rgba(48, 209, 88, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    border-color: rgba(48, 209, 88, 0.15);
  }
  .hero-card.status-pending {
    box-shadow: 0 12px 40px rgba(255, 159, 10, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 159, 10, 0.2);
  }
  .hero-card.status-alert {
    box-shadow: 0 12px 45px rgba(255, 69, 58, 0.12), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 69, 58, 0.25);
  }

  .hero-card::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(10, 132, 255, 0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Legacy status ring */
  .sentinel-halo-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4px 0 8px;
    position: relative;
  }

  .sentinel-halo {
    position: relative;
    width: 154px;
    height: 154px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }

  .halo-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Legacy ring styling */
  .halo-ring-tick {
    fill: none;
    stroke: var(--color-text-muted);
    stroke-width: 1.5;
    stroke-dasharray: 1 4.5;
    opacity: 0.35;
    transform-origin: center;
    transition: stroke 0.3s;
  }

  .halo-ring-orbit {
    fill: none;
    stroke: rgba(255, 255, 255, 0.03);
    stroke-width: 1;
  }

  .halo-ring-active {
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    transform-origin: center;
    transform: rotate(-90deg);
    transition: stroke 0.4s, stroke-dasharray 0.4s;
  }

  .halo-comet {
    fill: currentColor;
    transform-origin: center;
    transition: color 0.4s;
  }

  .halo-core-glow {
    fill: none;
    transform-origin: center;
    transition: fill 0.4s, opacity 0.4s;
  }

  /* Dynamic Dashboard Status Colors and Animations */
  /* Inactive state */
  .status-empty .halo-ring-tick {
    stroke: #3A3A3C;
  }
  .status-empty .halo-ring-active {
    stroke: #2C2C2E;
    stroke-dasharray: 40 300;
  }
  .status-empty .halo-comet {
    color: #48484A;
    transform: rotate(0deg);
  }
  .status-empty .halo-core-glow {
    fill: rgba(255, 255, 255, 0.002);
  }

  /* Active state */
  .status-active .halo-ring-tick {
    stroke: var(--color-success);
    opacity: 0.25;
    animation: rotateTicksClockwise 60s linear infinite;
  }
  .status-active .halo-ring-active {
    stroke: var(--color-success);
    stroke-dasharray: 290;
    stroke-dashoffset: 0;
    opacity: 0.7;
  }
  .status-active .halo-comet {
    color: var(--color-success);
    animation: rotateComet 4.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    filter: drop-shadow(0 0 4px var(--color-success));
  }
  .status-active .halo-core-glow {
    fill: rgba(48, 209, 88, 0.03);
    animation: corePulseBreath 3s ease-in-out infinite;
  }

  /* Pending warning state */
  .status-pending .halo-ring-tick {
    stroke: var(--color-warning);
    opacity: 0.4;
    animation: rotateTicksCounter 15s linear infinite;
  }
  .status-pending .halo-ring-active {
    stroke: var(--color-warning);
    stroke-dasharray: 220;
    stroke-dashoffset: 70;
  }
  .status-pending .halo-comet {
    color: var(--color-warning);
    animation: rotateComet 2s linear infinite;
    filter: drop-shadow(0 0 6px var(--color-warning));
  }
  .status-pending .halo-core-glow {
    fill: rgba(255, 159, 10, 0.04);
    animation: pendingCorePulse 1s ease-in-out infinite alternate;
  }

  /* Alert state */
  .status-alert .halo-ring-tick {
    stroke: var(--color-danger);
    opacity: 0.6;
    animation: rotateTicksClockwise 3s linear infinite;
  }
  .status-alert .halo-ring-active {
    stroke: var(--color-danger);
    stroke-dasharray: 300;
    animation: alertRingBlink 0.5s ease infinite alternate;
  }
  .status-alert .halo-comet {
    color: var(--color-danger);
    animation: rotateComet 0.75s linear infinite;
    filter: drop-shadow(0 0 8px var(--color-danger));
  }
  .status-alert .halo-core-glow {
    fill: rgba(255, 69, 58, 0.12);
    animation: alertCorePulse 0.5s ease infinite alternate;
  }

  /* Keyframe Animations */
  @keyframes rotateTicksClockwise {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes rotateTicksCounter {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
  }
  @keyframes rotateComet {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes corePulseBreath {
    0%, 100% { transform: scale(0.95); fill: rgba(48, 209, 88, 0.02); }
    50% { transform: scale(1.05); fill: rgba(48, 209, 88, 0.08); }
  }
  @keyframes pendingCorePulse {
    0% { transform: scale(0.92); fill: rgba(255, 159, 10, 0.02); }
    100% { transform: scale(1.08); fill: rgba(255, 159, 10, 0.1); }
  }
  @keyframes alertRingBlink {
    0% { opacity: 0.3; stroke-width: 1.5; }
    100% { opacity: 0.95; stroke-width: 3; }
  }
  @keyframes alertCorePulse {
    0% { transform: scale(0.9); fill: rgba(255, 69, 58, 0.04); }
    100% { transform: scale(1.1); fill: rgba(255, 69, 58, 0.22); }
  }

  @keyframes telemetryDraw {
    0% { stroke-dashoffset: 400; }
    100% { stroke-dashoffset: 0; }
  }

  .halo-center {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  /* Micro Typography and Layout */
  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .section-title h3 {
    margin: 0;
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--color-text-secondary);
    text-transform: uppercase;
  }

  .section-title button {
    border: 0;
    background: transparent;
    color: var(--color-primary);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--color-primary);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .headline {
    margin: 0;
    color: #FFFFFF;
    font-size: 20px;
    line-height: 1.25;
    font-weight: 800;
    letter-spacing: -0.025em;
  }

  .body-text {
    margin: 6px 0 0;
    color: var(--color-text-secondary);
    font-size: var(--font-size-sm);
    line-height: var(--line-height-body);
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
    width: 100%;
  }

  .meta-box {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.03);
    text-align: left;
  }

  .meta-box span {
    display: block;
    margin-bottom: 2px;
    color: var(--color-text-secondary);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .meta-box strong {
    display: block;
    color: var(--color-text);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  /* Premium Buttons */
  .primary-btn,
  .secondary-btn,
  .danger-btn,
  .ghost-btn {
    min-height: 44px;
    width: 100%;
    border-radius: var(--radius-sm);
    border: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 700;
    font-size: var(--font-size-body);
    line-height: var(--line-height-tight);
    cursor: pointer;
    transition: transform 0.12s cubic-bezier(0.16, 1, 0.3, 1), background 0.15s ease, box-shadow 0.15s;
  }

  .primary-btn {
    background: var(--color-primary);
    color: #FFFFFF;
    box-shadow: 0 4px 15px rgba(10, 132, 255, 0.2);
  }

  .primary-btn:active {
    transform: scale(0.975);
    background: #0070D2;
    box-shadow: 0 2px 6px rgba(10, 132, 255, 0.1);
  }

  .secondary-btn {
    background: rgba(255, 255, 255, 0.05);
    color: var(--color-text);
    border: 1px solid rgba(255, 255, 255, 0.02);
  }

  .secondary-btn:active {
    transform: scale(0.975);
    background: rgba(255, 255, 255, 0.08);
  }

  .danger-btn {
    background: var(--color-danger);
    color: #FFFFFF;
    box-shadow: 0 4px 15px rgba(255, 69, 58, 0.2);
  }

  .danger-btn:active {
    transform: scale(0.975);
    background: #DF2C22;
  }

  .ghost-btn {
    background: transparent;
    color: var(--color-primary);
  }

  .ghost-btn:active {
    transform: scale(0.97);
    background: rgba(10, 132, 255, 0.05);
  }

  button:disabled {
    background: rgba(255, 255, 255, 0.02) !important;
    color: var(--color-text-secondary) !important;
    border-color: transparent !important;
    cursor: not-allowed;
    opacity: 0.45;
    transform: none !important;
    box-shadow: none !important;
  }

  .button-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
  }

  /* Dynamic Custom Status Pills */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: var(--font-size-xxs);
    line-height: var(--line-height-tight);
    font-weight: 700;
  }

  .status-pill::before {
    content: "";
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: currentColor;
  }

  .status-success {
    background: var(--color-success-soft);
    color: #30D158;
  }

  .status-warning {
    background: var(--color-warning-soft);
    color: #FF9F0A;
  }

  .status-danger {
    background: var(--color-danger-soft);
    color: #FF453A;
  }

  .status-muted {
    background: rgba(255, 255, 255, 0.06);
    color: var(--color-text-secondary);
  }

  /* List row details */
  .summary-row,
  .list-row {
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  }

  .summary-row:last-child,
  .list-row:last-child {
    border-bottom: 0;
    padding-bottom: 0;
  }

  .row-title {
    display: block;
    color: #FFFFFF;
    font-size: var(--font-size-body);
    line-height: var(--line-height-tight);
    font-weight: 600;
    opacity: 0.95;
  }

  .row-subtitle {
    display: block;
    margin-top: 2px;
    color: var(--color-text-secondary);
    font-size: var(--font-size-xs);
    line-height: var(--line-height-body);
  }

  .segmented {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    padding: 3px;
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.02);
  }

  .segmented button {
    min-height: 32px;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: var(--color-text-secondary);
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .segmented button.active {
    background: rgba(255, 255, 255, 0.06);
    color: #FFFFFF;
    font-weight: 700;
  }

  .template-card {
    padding: 14px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.015);
    cursor: pointer;
    transition: transform 0.1s ease, border-color 0.2s, background 0.2s;
  }

  .template-card.selected {
    border-color: rgba(10, 132, 255, 0.5);
    background: var(--color-primary-soft);
  }

  .template-card:active {
    transform: scale(0.985);
  }

  .template-card h4 {
    margin: 0 0 3px;
    font-size: 13.5px;
    font-weight: 700;
    color: #FFFFFF;
  }

  .template-card p {
    margin: 0;
    color: var(--color-text-secondary);
    font-size: 11.5px;
    line-height: 1.4;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .field-group label {
    color: var(--color-text);
    font-size: var(--font-size-label);
    line-height: var(--line-height-tight);
    font-weight: var(--font-weight-label);
    opacity: 0.9;
  }

  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    min-height: var(--control-height);
    padding: 9px var(--control-padding-x);
    border: 1px solid var(--color-text-muted);
    border-radius: var(--radius-sm);
    outline: 0;
    background: rgba(0, 0, 0, 0.2);
    color: #FFFFFF;
    font-size: var(--font-size-body);
    line-height: var(--line-height-body);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
  }

  .field-group textarea {
    min-height: 68px;
    resize: none;
  }

  .field-help {
    color: var(--color-text-secondary);
    font-size: var(--font-size-xs);
    line-height: var(--line-height-body);
  }

  .field-error {
    display: none;
    color: var(--color-danger);
    font-size: var(--font-size-xs);
    font-weight: 600;
  }

  .field-group.invalid input,
  .field-group.invalid select,
  .field-group.invalid textarea {
    border-color: var(--color-danger);
    background: rgba(255, 69, 58, 0.05);
  }

  .field-group.invalid .field-error {
    display: block;
  }

  /* High-end bottom tabs with frosted glass blur */
  .bottom-tabs {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: var(--tab-height);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    padding: 4px 12px 10px;
    border-top: 1px solid var(--color-border);
    background: rgba(18, 19, 26, 0.7);
    backdrop-filter: blur(24px);
    z-index: 85;
  }

  /* Pressing scale feedback */
  .sentinel-halo {
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .sentinel-halo.pressing {
    transform: scale(0.94);
  }
  .sentinel-halo.pressing .halo-core-glow {
    animation: corePressingGlow 0.4s ease infinite alternate;
  }
  @keyframes corePressingGlow {
    0% { fill: rgba(48, 209, 88, 0.15); filter: drop-shadow(0 0 10px rgba(48, 209, 88, 0.6)); }
    100% { fill: rgba(48, 209, 88, 0.45); filter: drop-shadow(0 0 25px rgba(48, 209, 88, 0.9)); }
  }

  .ambient-note-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    width: 100%;
    margin-top: 14px;
    transition: border-color 0.3s, background 0.3s;
  }
  .ambient-note-bar:focus-within {
    background: rgba(255, 255, 255, 0.03);
    border-color: rgba(10, 132, 255, 0.2);
  }
  .ambient-note-bar .note-icon {
    font-size: 11px;
    color: var(--color-primary);
  }
  .ambient-note-bar input {
    border: 0;
    background: transparent;
    color: var(--color-text);
    font-size: 11.5px;
    flex: 1;
    outline: none;
    padding: 0;
    margin: 0;
  }
  .ambient-note-bar input::placeholder {
    color: var(--color-text-secondary);
    opacity: 0.65;
  }

  .tab {
    border: 0;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--color-text-secondary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s;
  }

  .tab svg {
    width: 18px;
    height: 18px;
    stroke-width: 2.2;
    transition: transform 0.15s;
  }

  .tab.active {
    color: var(--color-primary);
  }

  .tab.active svg {
    transform: translateY(-1px) scale(1.05);
  }

  .notice {
    display: none;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    line-height: 1.45;
  }

  .notice.visible {
    display: flex;
  }

  .notice.warning {
    background: var(--color-warning-soft);
    color: #FF9F0A;
    border: 1px solid rgba(255, 159, 10, 0.15);
  }

  .notice.error {
    background: var(--color-danger-soft);
    color: #FF453A;
    border: 1px solid rgba(255, 69, 58, 0.15);
  }

  .notice.success {
    background: var(--color-success-soft);
    color: #30D158;
    border: 1px solid rgba(48, 209, 88, 0.15);
  }

  .empty-state,
  .error-state,
  .loading-state {
    padding: 24px 12px;
    text-align: center;
  }

  .state-icon {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    margin: 0 auto 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.03);
    color: var(--color-text-secondary);
  }

  .state-icon svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2.2;
  }

  .empty-state h3,
  .error-state h3,
  .loading-state h3 {
    margin: 0 0 4px;
    font-size: 14.5px;
    font-weight: 700;
  }

  .empty-state p,
  .error-state p,
  .loading-state p {
    margin: 0 0 14px;
    color: var(--color-text-secondary);
    font-size: 12px;
    line-height: 1.45;
  }

  /* Shimmer Loading Skeleton */
  .skeleton {
    height: 12px;
    border-radius: 999px;
    background: linear-gradient(90deg, #1C1B22 25%, #25242E 50%, #1C1B22 75%);
    background-size: 200% 100%;
    animation: skeletonShimmer 1.4s ease infinite;
  }

  @keyframes skeletonShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Spring-Loaded Frosted Bottom Sheet Overlay */
  .sheet-mask {
    position: absolute;
    inset: 0;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(0px);
    z-index: 110;
    transition: opacity 0.3s ease, backdrop-filter 0.3s ease, visibility 0.3s ease;
    display: flex;
    align-items: flex-end;
  }

  .sheet-mask.visible {
    opacity: 1;
    visibility: visible;
    backdrop-filter: blur(10px);
    pointer-events: auto;
  }

  .sheet {
    width: 100%;
    padding: 6px var(--page-padding) 24px;
    border-radius: 20px 20px 0 0;
    background: #12131A;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.6);
    transform: translateY(100%);
    transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .sheet-mask.visible .sheet {
    transform: translateY(0);
  }

  .sheet-handle {
    width: 34px;
    height: 4px;
    margin: 4px auto 16px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.15);
  }

  .sheet-title {
    margin: 0 0 6px;
    color: var(--color-text);
    font-size: var(--font-size-title);
    line-height: var(--line-height-tight);
    font-weight: var(--font-weight-title);
    letter-spacing: -0.02em;
    text-align: center;
  }

  .sheet-subtitle {
    margin: 0 0 14px;
    color: var(--color-text-secondary);
    font-size: var(--font-size-sm);
    line-height: var(--line-height-body);
    text-align: center;
  }

  .sheet-scroll-list {
    max-height: 320px;
    overflow-y: auto;
    display: grid;
    gap: 8px;
    text-align: left;
  }

  .control-card {
    width: 100%;
    min-height: 54px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(22, 119, 255, 0.1);
    background: rgba(255, 255, 255, 0.76);
    color: var(--color-text);
    text-align: left;
    cursor: pointer;
  }

  .control-card.is-toggle {
    grid-template-columns: auto 1fr;
  }

  .control-card input[type="checkbox"] {
    width: 18px;
    height: 18px;
    min-height: 18px;
    margin: 0;
    accent-color: var(--color-primary);
  }

  .control-card strong,
  .control-card .row-title {
    display: block;
    color: var(--color-text);
    font-size: var(--font-size-body);
    line-height: var(--line-height-tight);
    font-weight: 700;
  }

  .control-card span,
  .control-card .row-caption {
    display: block;
    margin-top: 3px;
    color: var(--color-text-secondary);
    font-size: var(--font-size-xs);
    line-height: var(--line-height-body);
  }

  .form-control {
    width: 100%;
    min-height: var(--control-height);
    padding: 9px var(--control-padding-x);
    border: 1px solid rgba(22, 119, 255, 0.12);
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.86);
    color: var(--color-text);
    font-size: var(--font-size-body);
    line-height: var(--line-height-body);
    outline: 0;
  }

  .form-control:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.14);
  }

  /* Compact Native Toast */
  .toast {
    position: absolute;
    left: 32px;
    right: 32px;
    bottom: 80px;
    opacity: 0;
    transform: translateY(10px) scale(0.96);
    pointer-events: none;
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(30, 31, 40, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #FFFFFF;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    z-index: 120;
    transition: var(--transition-spring);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }

  /* Bezel Glowing Frame for Haptic Feedback Simulation */
  .haptic-glow-ring {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 34px;
    z-index: 105;
    border: 3px solid transparent;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .haptic-glow-ring.pulse-success {
    animation: hapticFlashSuccess 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .haptic-glow-ring.pulse-warning {
    animation: hapticFlashWarning 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .haptic-glow-ring.pulse-error {
    animation: hapticFlashError 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes hapticFlashSuccess {
    0% { opacity: 0; border-color: var(--color-success); box-shadow: inset 0 0 15px rgba(48, 209, 88, 0.4); }
    15% { opacity: 1; border-color: var(--color-success); box-shadow: inset 0 0 25px rgba(48, 209, 88, 0.6); }
    100% { opacity: 0; border-color: transparent; box-shadow: inset 0 0 0px transparent; }
  }
  @keyframes hapticFlashWarning {
    0% { opacity: 0; border-color: var(--color-warning); box-shadow: inset 0 0 15px rgba(255, 159, 10, 0.4); }
    15% { opacity: 1; border-color: var(--color-warning); box-shadow: inset 0 0 25px rgba(255, 159, 10, 0.6); }
    100% { opacity: 0; border-color: transparent; box-shadow: inset 0 0 0px transparent; }
  }
  @keyframes hapticFlashError {
    0% { opacity: 0; border-color: var(--color-danger); box-shadow: inset 0 0 15px rgba(255, 69, 58, 0.4); }
    15% { opacity: 1; border-color: var(--color-danger); box-shadow: inset 0 0 25px rgba(255, 69, 58, 0.6); }
    100% { opacity: 0; border-color: transparent; box-shadow: inset 0 0 0px transparent; }
  }

  .toast.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  details {
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.01);
    padding: 10px 12px;
    border: 1px solid var(--color-border);
  }

  summary {
    color: var(--color-text);
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
  }

  .audit-list {
    margin: 8px 0 0;
    padding: 0;
    list-style: none;
  }

  .audit-list li {
    padding: 5px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
    color: var(--color-text-secondary);
    font-size: 11px;
    line-height: 1.4;
  }

  /* Radar Pulse Effect */
  .radar-container {
    position: relative;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }

  .radar-circle {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(10, 132, 255, 0.06);
    animation: radarPulse 2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
  }

  .radar-circle-2 {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(10, 132, 255, 0.03);
    animation: radarPulse 2s cubic-bezier(0.16, 1, 0.3, 1) infinite 0.65s;
  }

  .radar-core {
    position: relative;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--color-primary);
    color: #FFFFFF;
    font-weight: 700;
    font-size: 13px;
    display: grid;
    place-items: center;
    border: 4px solid #12131A;
    box-shadow: 0 8px 24px rgba(10, 132, 255, 0.3);
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .radar-core:active {
    transform: scale(0.93);
  }

  @keyframes radarPulse {
    0% { transform: scale(0.65); opacity: 1; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  /* Previous visual layer */
  :root {
    --color-primary: #58B7FF;
    --color-primary-soft: rgba(88, 183, 255, 0.1);
    --color-success: #45D483;
    --color-success-soft: rgba(69, 212, 131, 0.1);
    --color-warning: #F0B45A;
    --color-warning-soft: rgba(240, 180, 90, 0.1);
    --color-danger: #F26D62;
    --color-danger-soft: rgba(242, 109, 98, 0.1);
    --color-bg: #07090D;
    --color-bg-panel: #10141B;
    --color-card: #151B24;
    --color-text: #EEF4F8;
    --color-text-secondary: #8D99A8;
    --color-text-muted: #495360;
    --color-border: rgba(178, 201, 225, 0.1);
    --color-border-glow: rgba(88, 183, 255, 0.26);
    --instrument-line: rgba(178, 201, 225, 0.12);
    --instrument-line-strong: rgba(178, 201, 225, 0.2);
    --instrument-well: rgba(3, 7, 12, 0.72);
    --shadow-card: 0 18px 42px rgba(0, 0, 0, 0.38);
  }

  body {
    background:
      radial-gradient(circle at 78% 16%, rgba(88, 183, 255, 0.16), transparent 28%),
      radial-gradient(circle at 24% 70%, rgba(69, 212, 131, 0.07), transparent 32%),
      linear-gradient(135deg, #03050A 0%, #0A0F16 48%, #03050A 100%);
  }

  .screen {
    background:
      linear-gradient(rgba(178, 201, 225, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(178, 201, 225, 0.018) 1px, transparent 1px),
      radial-gradient(circle at 50% 0%, rgba(88, 183, 255, 0.08), transparent 38%),
      var(--color-bg);
    background-size: 28px 28px, 28px 28px, auto, auto;
  }

  .card,
  .instrument-panel {
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.012)),
      var(--color-bg-panel);
    border: 1px solid var(--instrument-line);
    box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }

  .instrument-panel {
    position: relative;
    overflow: hidden;
    border-radius: 22px;
  }

  .instrument-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(rgba(255, 255, 255, 0.026) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.58), transparent 72%);
  }

  .instrument-shell {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .instrument-kicker {
    color: var(--color-text-secondary);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .instrument-title {
    margin: 0;
    color: var(--color-text);
    font-size: 18px;
    font-weight: 820;
    letter-spacing: -0.03em;
    line-height: 1.18;
  }

  .instrument-copy {
    margin: 5px 0 0;
    color: var(--color-text-secondary);
    font-size: 11.5px;
    line-height: 1.5;
  }

  .instrument-readout {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .instrument-dial {
    position: relative;
    width: 178px;
    height: 178px;
    display: grid;
    place-items: center;
    margin: 8px auto 14px;
  }

  .instrument-dial::before,
  .instrument-dial::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  .instrument-dial::before {
    inset: 10px;
    border: 1px solid var(--instrument-line-strong);
    box-shadow: inset 0 0 42px rgba(0, 0, 0, 0.42);
  }

  .instrument-dial::after {
    inset: 28px;
    border: 1px dashed rgba(178, 201, 225, 0.16);
  }

  .sentinel-halo {
    width: 156px;
    height: 156px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.07), transparent 33%),
      radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.76), rgba(0, 0, 0, 0.24) 64%, transparent 65%);
    border: 1px solid rgba(178, 201, 225, 0.11);
  }

  .halo-ring-orbit {
    stroke: rgba(178, 201, 225, 0.16);
  }

  .halo-ring-active {
    stroke-width: 2.4;
  }

  .dial-value {
    color: var(--color-text);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .dial-icon {
    width: 32px;
    height: 32px;
    color: currentColor;
  }

  .status-band {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--instrument-line);
    border-radius: 14px;
    background: var(--instrument-well);
    text-align: left;
  }

  .status-band strong {
    display: block;
    color: var(--color-text);
    font-size: 13px;
    line-height: 1.25;
  }

  .status-band span {
    display: block;
    margin-top: 2px;
    color: var(--color-text-secondary);
    font-size: 10.5px;
    line-height: 1.35;
  }

  .data-cell-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .data-cell {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    min-height: 58px;
    padding: 12px;
    border: 1px solid var(--instrument-line);
    border-radius: 16px;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.006)),
      rgba(4, 8, 13, 0.46);
    cursor: pointer;
    transition: transform 0.14s ease, border-color 0.18s ease, background 0.18s ease;
  }

  .data-cell:active {
    transform: scale(0.985);
    border-color: var(--instrument-line-strong);
  }

  .data-cell small,
  .capsule-card small,
  .ledger-row small {
    display: block;
    margin-bottom: 3px;
    color: var(--color-text-secondary);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .data-cell strong,
  .capsule-card strong,
  .ledger-row strong {
    display: block;
    color: var(--color-text);
    font-size: 13px;
    line-height: 1.25;
  }

  .data-cell span,
  .capsule-card span,
  .ledger-row span {
    display: block;
    margin-top: 3px;
    color: var(--color-text-secondary);
    font-size: 11px;
    line-height: 1.35;
  }

  .cell-meter {
    min-width: 54px;
    text-align: right;
    color: var(--color-primary);

  function clampActivityScore(value) {
    return Math.max(0, Math.min(100, Math.round(value)));

  function getActivityColorDepth(score, min, max) {
    if (max <= min) return 0;
    return Math.max(0, Math.min(1, (score - min) / (max - min)));
  }

  function getActivityStatusMeta(score = state.activityScore) {
    const normalized = clampActivityScore(score);
    if (normalized >= 82) {
      const depth = getActivityColorDepth(normalized, 82, 100);
      return {
        key: "veryActive",
        runbookStatus: "active",
        color: `hsl(148 58% ${64 - depth * 18}%)`,
        deep: `hsl(158 68% ${48 - depth * 14}%)`,
        soft: `rgba(34, 197, 94, ${0.14 + depth * 0.1})`,
        glow: `rgba(34, 197, 94, ${0.48 + depth * 0.3})`,
        surface: `rgba(236, 253, 245, ${0.3 + depth * 0.08})`,
        label: "活跃"
      };
    }
    if (normalized >= 56) {
      const depth = getActivityColorDepth(normalized, 56, 81);
      return {
        key: "normal",
        runbookStatus: "active",
        color: `hsl(${207 - depth * 20} 88% ${72 - depth * 12}%)`,
        deep: `hsl(${216 - depth * 38} 82% ${58 - depth * 10}%)`,
        soft: `rgba(22, 119, 255, ${0.12 + depth * 0.08})`,
        glow: `rgba(22, 119, 255, ${0.42 + depth * 0.18})`,
        surface: `rgba(239, 248, 255, ${0.3 + depth * 0.08})`,
        label: "正常"
      };
    }
    if (normalized >= 32) {
      const depth = getActivityColorDepth(normalized, 32, 55);
      return {
        key: "quiet",
        runbookStatus: "pending",
        color: `hsl(38 88% ${72 - depth * 12}%)`,
        deep: `hsl(35 86% ${56 - depth * 10}%)`,
        soft: `rgba(245, 158, 11, ${0.12 + depth * 0.08})`,
        glow: `rgba(245, 158, 11, ${0.38 + depth * 0.16})`,
        surface: "rgba(255, 251, 235, 0.3)",
        label: "静默"
      };
    }
    if (normalized >= 14) {
      const depth = getActivityColorDepth(normalized, 14, 31);
      return {
        key: "notified",
        runbookStatus: "alert",
        color: `hsl(0 76% ${72 - depth * 13}%)`,
        deep: `hsl(0 72% ${58 - depth * 12}%)`,

    const depth = 1 - getActivityColorDepth(normalized, 0, 13);
    return {
      key: "stale",
      runbookStatus: "stale",
      color: `hsl(258 78% ${74 - depth * 12}%)`,
      deep: `hsl(263 68% ${58 - depth * 14}%)`,

    state.activityTapTimes.push(now);
    const burst = state.activityTapTimes.length;
    const intervalMs = lastTapAt ? Math.max(120, now - lastTapAt) : 2800;
    return {
      boost: Math.min(26, 10 + burst * 4),
      burst,

    };

  function getActivityRestingScore() {
    if (!state.currentRunbook) return state.activityScore;
    const restingByStatus = {
      active: 66,
      pending: 44,
      alert: 24,
      stale: 8,
      empty: state.activityScore
    };
    return restingByStatus[state.runbookStatus] ?? Math.min(state.activityScore, 66);
  }

  function easeInOutCubic(value) {
    const t = Math.max(0, Math.min(1, value));
    return t < 0.5
      ? 4 * t * t * t
      : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function buildOrbStyle(activityMeta, score) {
    return `--orb-core:${activityMeta.color}; --orb-deep:${activityMeta.deep}; --orb-soft:${activityMeta.soft}; --orb-glow:${activityMeta.glow}; --orb-surface-glow:${activityMeta.surface}; --activity-score:${score};`;
  }

  function startActivityVisualDecay(signal = {}) {
    const restingScore = getActivityRestingScore();
    const burst = Math.max(1, Math.min(6, Number(signal.burst || 1)));
    const peakScore = Math.max(state.activityScore, Math.min(100, restingScore + 18 + burst * 4));
    state.activityVisualRestingScore = restingScore;
    state.activityVisualPulse = {
      startedAt: Date.now(),
      durationMs: 8200,
      fromScore: clampActivityScore(peakScore),
      toScore: clampActivityScore(restingScore)
    };
    scheduleActivityVisualDecay();
  }

  function getHomeOrbVisualScore(now = Date.now()) {
    const pulse = state.activityVisualPulse;
    if (!pulse) return clampActivityScore(state.activityVisualRestingScore ?? state.activityScore);

    const elapsed = now - pulse.startedAt;
    const progress = Math.max(0, Math.min(1, elapsed / pulse.durationMs));
    const eased = easeInOutCubic(progress);
    const visualScore = pulse.fromScore + (pulse.toScore - pulse.fromScore) * eased;
    if (progress >= 1) {
      state.activityVisualPulse = null;
      state.activityVisualRestingScore = pulse.toScore;
      return pulse.toScore;
    }
    return clampActivityScore(visualScore);
  }

  function applyOrbStyleToElement(element, style, visualScore) {
    if (!element) return;
    style.split(";").forEach(declaration => {
      const [property, value] = declaration.split(":");
      if (property?.trim() && value?.trim()) {
        element.style.setProperty(property.trim(), value.trim());
      }
    });
    element.dataset.visualScore = String(visualScore);
  }

  function updateHomeOrbVisualStyle() {
    const visualScore = getHomeOrbVisualScore();
    const visualMeta = getActivityStatusMeta(visualScore);
    const style = buildOrbStyle(visualMeta, visualScore);
    applyOrbStyleToElement(document.querySelector(".life-orb-button"), style, visualScore);
    applyOrbStyleToElement(document.querySelector(".life-orb-crest"), style, visualScore);
    applyOrbStyleToElement(document.querySelector(".activity-ecg"), style, visualScore);
    return Boolean(state.activityVisualPulse);
  }

  function scheduleActivityVisualDecay() {
    cancelAnimationFrame(scheduleActivityVisualDecay.frame);
    const tick = () => {
      const shouldContinue = updateHomeOrbVisualStyle();
      if (shouldContinue) {
        scheduleActivityVisualDecay.frame = requestAnimationFrame(tick);
      }
    };
    scheduleActivityVisualDecay.frame = requestAnimationFrame(tick);
  }

  function rememberActivityScore(score = state.activityScore, signal = {}) {
    state.activityHistory = [...state.activityHistory.slice(-17), clampActivityScore(score)];
    state.activityPulseSamples = [
      ...state.activityPulseSamples.slice(-23),
      {
        score: clampActivityScore(score),
        burst: Math.max(1, Number(signal.burst || 1)),
        intervalMs: Math.max(120, Number(signal.intervalMs || 2800)),
        source: signal.source || "tap"
      }
    ];
  }

  function normalizeActivityPulseSamples(values = state.activityPulseSamples) {
    const fallback = state.activityHistory.map(score => ({ score, burst: 1, intervalMs: 2400, source: "history" }));
    const samples = (values?.length ? values : fallback)
      .slice(-18)
      .map(sample => typeof sample === "number"
        ? { score: clampActivityScore(sample), burst: 1, intervalMs: 2400, source: "history" }
        : {
            score: clampActivityScore(sample.score),
            burst: Math.max(1, Math.min(6, Number(sample.burst || 1))),
            intervalMs: Math.max(120, Math.min(3200, Number(sample.intervalMs || 2400))),
            source: sample.source || "tap"
          });

    const latest = samples[samples.length - 1];
    if (!latest || latest.score !== state.activityScore) {
      samples.push({ score: state.activityScore, burst: 1, intervalMs: 2400, source: "current" });
    }
    return samples.slice(-18);
  }

  function buildActivityEcgPath(values = state.activityPulseSamples, width = 292, height = 82) {
    const samples = normalizeActivityPulseSamples(values);
    const gaps = samples.slice(1).map(sample => {
      const intervalWeight = Math.max(0.3, Math.min(1.3, sample.intervalMs / 2400));
      const burstWeight = Math.max(0.42, 1 - (sample.burst - 1) * 0.12);
      return intervalWeight * burstWeight;
    });
    const totalGap = gaps.reduce((sum, gap) => sum + gap, 0) || 1;
    const xPositions = [0];
    gaps.forEach(gap => {
      xPositions.push(xPositions[xPositions.length - 1] + (gap / totalGap) * width);
    });

    const points = [];

    samples.forEach((sample, index) => {
      const score = sample.score;
      const x = xPositions[index] || 0;
      const previousX = xPositions[index - 1] ?? 0;
      const nextX = xPositions[index + 1] ?? width;
      const localStep = Math.max(8, Math.min(26, (nextX - previousX) / 2 || 18));
      const baseline = height - 16 - (score / 100) * (height - 30);
      const frequency = Math.max(1, Math.min(6, sample.burst || 1));
      const intensity = Math.max(0.24, score / 100) * (0.86 + frequency * 0.12);
      points.push([x, baseline]);
      points.push([x + localStep * 0.22, baseline - 4 * intensity]);
      points.push([x + localStep * 0.36, baseline + 6 * intensity]);
      points.push([x + localStep * 0.5, baseline - (18 + frequency * 3.6) * intensity]);
      points.push([x + localStep * 0.62, baseline + (10 + frequency * 1.6) * intensity]);
      points.push([x + localStep * 0.78, baseline - 3 * intensity]);
    });

    const bounded = points
      .filter(([x]) => x <= width)
      .map(([x, y]) => [Math.round(x * 10) / 10, Math.round(Math.max(8, Math.min(height - 8, y)) * 10) / 10]);
    const line = bounded.map(([x, y], index) => `${index ? "L" : "M"} ${x} ${y}`).join(" ");
    const first = bounded[0] || [0, height - 14];
    const last = bounded[bounded.length - 1] || [width, height - 14];
    const area = `${line} L ${last[0]} ${height} L ${first[0]} ${height} Z`;
    const intensity = Math.max(...samples.map(sample => sample.burst || 1), 1);
    return { line, area, intensity };
  }

  function renderActivityEcg(style) {
    const { line, area, intensity } = buildActivityEcgPath();
    const scanDuration = Math.max(0.72, 2.15 - intensity * 0.24).toFixed(2);
    return `
      <div class="activity-ecg is-live" style="${style}; --ecg-intensity:${intensity}; --ecg-scan-duration:${scanDuration}s;" aria-label="近期活跃脉搏图">
        <svg viewBox="0 0 292 82" role="img">
          <defs>
            <linearGradient id="activityEcgScan" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0%" stop-color="currentColor" stop-opacity="0"/>
              <stop offset="50%" stop-color="currentColor" stop-opacity="0.16"/>
              <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <rect class="ecg-scan-beam" x="-8" y="0" width="16" height="82" rx="8"></rect>
          <path class="ecg-grid-line" d="M0 41 H292"></path>
          <path class="ecg-path-core" d="${line}"></path>
        </svg>
      </div>
    `;
  }

  function renderHome() {
    const hero = document.getElementById("homeHero");
    if (!hero) return;

    const meta = getHomeStateMeta();
    const visualScore = getHomeOrbVisualScore();
    const activityMeta = getActivityStatusMeta(visualScore);
    const orbStyle = buildOrbStyle(activityMeta, visualScore);
    hero.className = `home-orb-dashboard ${meta.className}`;
    hero.innerHTML = `
      <div class="ceremony-stage">
        <div class="life-orb-shell">
          <button type="button" class="life-orb-button" style="${orbStyle}" data-visual-score="${visualScore}" onclick="handleLifeOrbTap(event)" aria-label="点亮生命球">
            <span class="life-orb-ripple-layer" data-ripple="1"></span>
            <span class="life-orb-ripple-layer" data-ripple="2"></span>
            <span class="life-orb-ripple-layer" data-ripple="3"></span>
            <span class="life-orb-surface"></span>
            <span class="life-orb-sheen"></span>

  function renderGuardianSetupIntro() {
    // The prototype now has only one guard: proving the user is alive through activity pulse.

  /* ------------------- Create Flow ------------------- */
  function syncReminderModeFields() {
    const mode = document.getElementById("planReminderMode")?.value || "daily";
    const dailyFields = document.getElementById("dailyReminderFields");
    const intervalFields = document.getElementById("intervalReminderFields");
    if (dailyFields) dailyFields.style.display = mode === "daily" ? "block" : "none";
    if (intervalFields) intervalFields.style.display = mode === "interval" ? "grid" : "none";
  }

  function readReminderRhythm() {
    const reminderMode = document.getElementById("planReminderMode").value;
    const reminderTime = document.getElementById("planReminderTime").value || "21:00";
    const intervalValue = Math.max(1, Number(document.getElementById("planIntervalValue").value || 24));
    const intervalUnit = document.getElementById("planIntervalUnit").value;
    return { reminderMode, reminderTime, intervalValue, intervalUnit };
  }

  function getDefaultGuardianSelection() {
    return state.currentRunbook?.guardianSelection?.length
      ? [...state.currentRunbook.guardianSelection]
      : state.contacts.filter(isGuardianEnabled).slice(0, 1).map(contact => contact.name);
  }

  function readGuardianSelection() {
    return Array.from(document.querySelectorAll(".create-guardian-checkbox:checked"))
      .map(input => input.value);
  }

  function readPrimaryGuardian() {
    return document.querySelector(".create-primary-guardian-radio:checked")?.value || "";
  }

  function getPrimaryGuardianLabel(primaryGuardian) {
    return primaryGuardian ? `${primaryGuardian} · 可按约查看保险柜` : "无首要守护人";
  }

  function isGuardianEnabled(contact) {
    return contact?.enabled !== false;
  }

  function getContactPermissionMode(contact) {
    if (!isGuardianEnabled(contact)) return "message";
    if (contact?.permissionMode) return contact.permissionMode;
    return contact?.permission?.includes("开放资料") || contact?.permission?.includes("保险柜") ? "vault" : "message";
  }

  function getContactPermissionLabel(contact) {
    if (!isGuardianEnabled(contact)) return "已停用";
    return getContactPermissionMode(contact) === "vault"
      ? "首要守护人，可按约查看保险柜"
      : "只接收平安信";
  }

  function normalizeGuardianContact(contact) {
    if (!contact) return null;
    contact.enabled = isGuardianEnabled(contact);
    contact.permissionMode = getContactPermissionMode(contact);
    contact.permission = getContactPermissionLabel(contact);
    return contact;
  }

  function syncPrimaryGuardianVaultPermission(primaryGuardian) {
    const primaryContact = state.contacts.find(contact => contact.name === primaryGuardian && isGuardianEnabled(contact));
    state.guardianStars.forEach(star => {
      if (star.role !== "guardian") return;
      const contact = state.contacts.find(item => item.name === star.name);
      const enabled = contact ? isGuardianEnabled(contact) : true;
      const canViewVault = Boolean(primaryContact && star.name === primaryContact.name && getContactPermissionMode(primaryContact) === "vault");
      star.canMessage = enabled;
      star.canViewVault = enabled && canViewVault;
      star.vaultHint = !enabled ? "未参与守护" : star.canViewVault ? "首要守护人，可查看开放资料" : "只接收平安信和状态";
    });
    state.contacts.forEach(contact => {
      contact.permissionMode = contact.name === primaryGuardian && isGuardianEnabled(contact) ? "vault" : getContactPermissionMode(contact) === "vault" ? "message" : getContactPermissionMode(contact);
      contact.permission = getContactPermissionLabel(contact);
    });
  }

  function ensureRunbookGuardianConsistency(runbook = state.currentRunbook) {
    if (!runbook) return null;
    const enabledContacts = state.contacts.filter(isGuardianEnabled);
    const enabledNames = enabledContacts.map(contact => contact.name);
    runbook.guardianSelection = (runbook.guardianSelection || [])
      .filter(name => enabledNames.includes(name))
      .filter((name, index, list) => list.indexOf(name) === index);

    if (!runbook.guardianSelection.length && enabledContacts.length) {
      runbook.guardianSelection = [enabledContacts[0].name];
    }

    const primaryContact = enabledContacts.find(contact => contact.name === runbook.primaryGuardian);
    const primaryCanViewVault = primaryContact && runbook.guardianSelection.includes(primaryContact.name) && getContactPermissionMode(primaryContact) === "vault";
    if (!primaryCanViewVault) {
      runbook.primaryGuardian = "";
    }

    runbook.contact = runbook.primaryGuardian || runbook.guardianSelection[0] || "";
    syncPrimaryGuardianVaultPermission(runbook.primaryGuardian);
    return runbook;
  }

  function ensurePrimaryGuardianSelection() {
    const guardianSelection = readGuardianSelection();
    const primaryGuardian = readPrimaryGuardian();
    if (!guardianSelection.length) {
      showToast("请选择至少一位守护人");
      return null;
    }
    return {
      guardianSelection,
      primaryGuardian: guardianSelection.includes(primaryGuardian) ? primaryGuardian : ""
    };
  }

  function renderGuardianPicker(selection = getDefaultGuardianSelection(), primaryGuardian = "") {
    const container = document.getElementById("guardianPicker");
    if (!container) return;
    const enabledContacts = state.contacts.filter(isGuardianEnabled);
    const enabledNames = enabledContacts.map(contact => contact.name);
    const normalizedSelection = selection.filter(name => enabledNames.includes(name));
    const normalizedPrimary = normalizedSelection.includes(primaryGuardian) ? primaryGuardian : "";
    container.innerHTML = enabledContacts.map(contact => {
      const checked = normalizedSelection.includes(contact.name) ? "checked" : "";
      const primaryChecked = contact.name === normalizedPrimary ? "checked" : "";
      return `
        <div class="priority-card guardian-picker-card">
          <label>
            <input class="create-guardian-checkbox" type="checkbox" value="${contact.name}" ${checked} onchange="handleGuardianSelectionChange()">
            <span><strong>${contact.name}（${contact.relation}）</strong><span>${contact.phone}</span></span>
          </label>
          <label class="status-pill primary-guardian-chip ${primaryChecked ? 'status-success' : 'status-muted'}" style="cursor:pointer; flex:0 0 auto;">
            <input class="create-primary-guardian-radio" type="radio" name="primaryGuardian" value="${contact.name}" ${primaryChecked} onchange="handlePrimaryGuardianChange()" style="display:none;">
            首要
          </label>
        </div>
      `;
    }).join("") || '<p style="margin:0; color:var(--color-text-secondary); font-size:12px;">还没有可用守护人</p>';
  }

  function handleGuardianSelectionChange() {
    const selection = readGuardianSelection();
    const primaryGuardian = readPrimaryGuardian();
    renderGuardianPicker(selection, selection.includes(primaryGuardian) ? primaryGuardian : "");
  }

  function handlePrimaryGuardianChange() {
    const selection = readGuardianSelection();
    const primaryGuardian = readPrimaryGuardian();
    if (!selection.includes(primaryGuardian)) {
      const checkbox = Array.from(document.querySelectorAll(".create-guardian-checkbox")).find(input => input.value === primaryGuardian);
      if (checkbox) checkbox.checked = true;
    }
    renderGuardianPicker(readGuardianSelection(), primaryGuardian);
  }

  function getAllSafeVaultAssets() {
    return [
      ...state.vaultItems.map(item => ({ ...item, kind: "document" })),
      ...state.vaultPasswords.map(item => ({ ...item, kind: "password" }))
    ];
  }

  function getDefaultVaultSelection() {
    return getAllSafeVaultAssets()
      .filter(item => item.allowRelease)
      .map(item => item.id);
  }

  function readCreateVaultSelection() {
    return Array.from(document.querySelectorAll(".create-vault-checkbox:checked"))
      .map(input => input.value);
  }

  function getVaultSelectionSummary(selection = []) {
    const selectedNames = getAllSafeVaultAssets()
      .filter(item => selection.includes(item.id))
      .map(item => item.title);
    if (!selectedNames.length) return "未选择";
    return `已选 ${selectedNames.length} 项：${selectedNames.join("、")}`;
  }

  function getVaultSelectionRiskMeta(selection = []) {
    if (selection.length > 0) {
      return {
        className: "status-success",
        label: "保险柜已选择",
        detail: getVaultSelectionSummary(selection),
        confirmLabel: state.createMode === "edit" ? "保存守护" : "开始守护"
      };
    }

    return {
      className: "status-warning",
      label: "未选择保险柜",
      detail: "守护人不会看到保险柜内容",
      confirmLabel: state.createMode === "edit" ? "仍然保存守护" : "仍然开始守护"
    };
  }

  function syncVaultSelectionToAllowRelease(selection = []) {
    state.vaultItems.forEach(item => item.allowRelease = selection.includes(item.id));
    state.vaultPasswords.forEach(item => item.allowRelease = selection.includes(item.id));
  }

  function renderCreateVaultPicker(selection = getDefaultVaultSelection()) {
    const container = document.getElementById("createVaultPicker");
    if (!container) return;
    const assets = getAllSafeVaultAssets();
    container.innerHTML = assets.map(item => {
      const checked = selection.includes(item.id) ? "checked" : "";
      const subtitle = item.kind === "password" ? item.account : item.type;
      return `
        <label class="priority-card" style="cursor:pointer;">
          <div>
            <strong>${item.title}</strong>
            <span>${item.kind === "password" ? "密码" : "资料"} · ${subtitle}</span>
          </div>
          <input class="create-vault-checkbox" type="checkbox" value="${item.id}" ${checked} style="width:18px; height:18px;">
        </label>
      `;
    }).join("") || '<p style="margin:0; color:var(--color-text-secondary); font-size:12px;">保险柜还没有内容</p>';
  }

  function startCreateFlow() {
    if (state.currentRunbook && state.createMode !== "edit") {
      openRunbookSheet();
      return;
    }

    state.createMode = "create";
    document.getElementById("planReminderMode").value = "daily";
    document.getElementById("planReminderTime").value = "21:00";
    document.getElementById("planIntervalValue").value = "24";
    document.getElementById("planIntervalUnit").value = "hours";
    document.getElementById("planBufferHours").value = "4";
    renderGuardianPicker(getDefaultGuardianSelection(), "");
    renderCreateVaultPicker(getDefaultVaultSelection());
    syncReminderModeFields();
    showCreateStep("form");
    goToPage("create");
  }

  function startEditRunbookFlow() {
    if (!state.currentRunbook) {
      startCreateFlow();
      return;
    }

    state.createMode = "edit";

    document.getElementById("planReminderMode").value = state.currentRunbook.reminderMode || "daily";
    document.getElementById("planReminderTime").value = state.currentRunbook.reminderTime || "21:00";
    document.getElementById("planIntervalValue").value = String(state.currentRunbook.intervalValue || state.currentRunbook.frequency || 24);
    document.getElementById("planIntervalUnit").value = state.currentRunbook.intervalUnit || "hours";
    document.getElementById("planBufferHours").value = String(state.currentRunbook.bufferHours || 4);
    ensureRunbookGuardianConsistency(state.currentRunbook);
    renderGuardianPicker(state.currentRunbook.guardianSelection || getDefaultGuardianSelection(), state.currentRunbook.primaryGuardian || "");
    renderCreateVaultPicker(state.currentRunbook.vaultSelection || getDefaultVaultSelection());
    syncReminderModeFields();

    showCreateStep("form");
    goToPage("create");
  }

  function showCreateStep(step) {
    const isForm = step === "form";
    const isReview = step === "review";

    document.getElementById("createStepForm").style.display = isForm ? "block" : "none";
    document.getElementById("createStepReview").style.display = isReview ? "block" : "none";

    document.getElementById("createStepLabel").innerText = isForm ? "第 1 步 / 共 2 步" : "第 2 步 / 共 2 步";
    document.getElementById("createTitle").innerText = isForm ? "设置" : "确认";
    document.getElementById("createSubtitle").innerText = isForm ? "守护人 · 静默 · 保险柜" : "确认设置";
    const reviewPrimaryAction = document.getElementById("reviewPrimaryAction");
    if (reviewPrimaryAction) {
      reviewPrimaryAction.innerText = state.createMode === "edit" ? "确认并保存守护" : "确认并开始守护";
    }
  }

  function validateField(fieldId) {
    const input = document.getElementById(fieldId);
    const container = document.getElementById(`field${fieldId.charAt(0).toUpperCase() + fieldId.slice(1)}`);
    if (!input || !container) return true;

    if (input.disabled || input.style.display === "none" || container.style.display === "none") return true;

    if (!input.value.trim()) {
      container.classList.add("invalid");
      return false;
    } else {
      container.classList.remove("invalid");
      return true;
    }
  }

  function continueFormToReview() {
    const rhythm = readReminderRhythm();
    const bufferHours = document.getElementById("planBufferHours").value;
    const guardianMeta = ensurePrimaryGuardianSelection();
    if (!guardianMeta) return;
    const { guardianSelection, primaryGuardian } = guardianMeta;
    const vaultSelection = readCreateVaultSelection();
    const vaultSelectionSummary = getVaultSelectionSummary(vaultSelection);
    const vaultRiskMeta = getVaultSelectionRiskMeta(vaultSelection);
    const draftRunbook = { ...rhythm };
    const nextCheck = getNextCheckLabel(draftRunbook);
    const reminderLabel = getReminderLabel(draftRunbook);
    const bufferLabel = `${bufferHours} 小时`;

    document.getElementById("reviewCard").innerHTML = `
      <div style="font-size:13px; font-weight:720; color:var(--color-text); margin-bottom:6px;">${state.createMode === "edit" ? "即将保存守护" : "即将开始守护"}</div>
      <h2 class="headline" style="font-size:17px; margin:6px 0 2px;">生命守护</h2>
      <p class="body-text" style="font-size:11.5px; margin-bottom:12px;">生命守护</p>
      
      <div class="ledger-row">
        <div><strong>守护目标</strong><span>确认我仍然正常活着</span></div>
      </div>
      <div class="ledger-row">
        <div><strong>报平安方式</strong><span>${reminderLabel}</span></div>
      </div>
      <div class="ledger-row">
        <div><strong>等候时限</strong><span>错过吉时后仍有 ${bufferLabel} 可以报平安</span></div>
      </div>
      <div class="ledger-row">
        <div><strong>守护人</strong><span>${guardianSelection.join("、")}</span></div>
      </div>
      <div class="ledger-row">
        <div><strong>首要守护人</strong><span>${getPrimaryGuardianLabel(primaryGuardian)}</span></div>
      </div>
      <div class="ledger-row">
        <div><strong>保险柜</strong><span style="word-break: break-all;">${vaultSelectionSummary}</span></div>
      </div>
      <div class="status-band" style="margin-top:12px;">
        <div>
          <strong>${vaultRiskMeta.label}</strong>
          <span>${vaultRiskMeta.detail}</span>
        </div>
        <span class="status-pill ${vaultRiskMeta.className}">${vaultSelection.length || 0} 项</span>
      </div>
    `;

    state.pendingRunbook = {
      title: "生命守护",
      type: "生命守护",
      frequency: rhythm.intervalUnit === "hours" ? String(rhythm.intervalValue) : "",
      reminderMode: rhythm.reminderMode,
      reminderTime: rhythm.reminderTime,
      intervalValue: rhythm.intervalValue,
      intervalUnit: rhythm.intervalUnit,
      bufferHours: Number(bufferHours),
      contact: primaryGuardian,
      guardianSelection: guardianSelection,
      primaryGuardian: primaryGuardian,
      nextCheck: nextCheck,
      vaultSelection: vaultSelection
    };

    showCreateStep("review");

    const isEdit = state.createMode === "edit";

      <div class="status-band" style="margin-bottom:14px;">
        <div>
          <strong>${vaultRiskMeta.label}</strong>
          <span>${vaultRiskMeta.detail}</span>
        </div>
        <span class="status-pill ${vaultRiskMeta.className}">${state.pendingRunbook?.vaultSelection?.length || 0} 项</span>
      </div>

  function activateRunbook() {
    state.currentRunbook = state.pendingRunbook;

    syncPrimaryGuardianVaultPermission(state.currentRunbook.primaryGuardian);

    state.lastActivityLabel = "刚刚开始生命守护";

  function renderPulse() {

      card.innerHTML = `

          <span class="status-pill ${isAlert ? 'status-danger' : isPending ? 'status-warning' : isStale ? 'status-attention' : 'status-success'}">${isAlert ? '信已传' : isPending ? '待报' : isStale ? '需关注' : '安好'}</span>

      </div>

        label: "需关注",
        color: "#8B5CF6",
        glow: "rgba(139, 92, 246, 0.95)",
        soft: "rgba(139, 92, 246, 0.16)"
      }
    };

    const alias = { quiet: "grace", notified: "alert" };
    return meta[alias[status] || status] || meta.normal;
  }

  function renderPeaceStarMap() {
    if (state.activePage !== "stars") {
      state.starMapRendered = false;
      return;
    }

    const container = document.getElementById("peaceStarMap");
    if (!container || !window.d3 || state.starMapRendered) return;

    state.starMapRendered = true;
    container.innerHTML = "";
    renderStarStatusDots();

    const width = container.clientWidth || 360;
    const height = container.clientHeight || 430;
    const activityMeta = getActivityStatusMeta();
    const nodes = state.guardianStars.map(node => {
      if (node.id !== "self") return { ...node };
      return {
        ...node,
        status: activityMeta.key,
        activity: `${state.lastActivityLabel} · 活跃值 ${state.activityScore}/100`,
        detail: getVaultReleaseMeta().detail
      };
    });
    const links = state.guardianLinks.map(link => ({ ...link }));

    const svg = d3.select(container)
      .append("svg")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("width", "100%")
      .attr("height", "100%");

    const defs = svg.append("defs");
    const filter = defs.append("filter")
      .attr("id", "neonStarGlow")
      .attr("x", "-80%")
      .attr("y", "-80%")
      .attr("width", "260%")
      .attr("height", "260%");

    filter.append("feGaussianBlur")
      .attr("stdDeviation", "5")
      .attr("result", "coloredBlur");

    const merge = filter.append("feMerge");
    merge.append("feMergeNode").attr("in", "coloredBlur");
    merge.append("feMergeNode").attr("in", "SourceGraphic");

    const zoomLayer = svg.append("g");
    const linkLayer = zoomLayer.append("g");
    const nodeLayer = zoomLayer.append("g");

    svg.call(
      d3.zoom()
        .scaleExtent([0.72, 1.85])
        .on("zoom", event => {
          closeStarLegendTooltip();
          zoomLayer.attr("transform", event.transform);
        })
    );

    svg.on("click", () => {
      closeStarLegendTooltip();
    });

    const link = linkLayer
      .selectAll("line")
      .data(links)
      .join("line")
      .attr("class", "star-link");

    const node = nodeLayer
      .selectAll("g")
      .data(nodes)
      .join("g")
      .attr("class", "star-node")
      .on("click", (event, item) => {
        event.stopPropagation();
        closeStarLegendTooltip();
        openGuardianStarSheet(item);
      });

    node.append("circle")
      .attr("r", item => item.id === "self" ? 29 : 24)
      .attr("fill", item => getStarStatusMeta(item.status).soft)
      .attr("stroke", item => getStarStatusMeta(item.status).color)
      .attr("stroke-width", item => item.id === "self" ? 2.4 : 1.8)
      .attr("filter", "url(#neonStarGlow)")
      .style("filter", item => `drop-shadow(0 0 14px ${getStarStatusMeta(item.status).glow}) drop-shadow(0 0 28px ${getStarStatusMeta(item.status).glow})`);

    node.append("circle")
      .attr("r", item => item.id === "self" ? 9 : 7)
      .attr("fill", item => getStarStatusMeta(item.status).color)
      .attr("opacity", 0.95);

    node.append("text")
      .attr("class", "star-label")
      .attr("dy", item => item.id === "self" ? 45 : 38)
      .text(item => item.name);

    node.append("text")
      .attr("class", "star-sub-label")
      .attr("dy", item => item.id === "self" ? 59 : 52)
      .text(item => getStarStatusMeta(item.status).label);

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(item => item.id).distance(104).strength(0.7))
      .force("charge", d3.forceManyBody().strength(-260))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collide", d3.forceCollide().radius(item => item.id === "self" ? 58 : 48).strength(0.86));

    node.call(
      d3.drag()
        .on("start", (event, item) => {
          if (!event.active) simulation.alphaTarget(0.24).restart();
          item.fx = item.x;
          item.fy = item.y;
        })
        .on("drag", (event, item) => {
          item.fx = event.x;
          item.fy = event.y;
        })
        .on("end", (event, item) => {
          if (!event.active) simulation.alphaTarget(0);
          item.fx = null;
          item.fy = null;
        })
    );

    simulation.on("tick", () => {
      link
        .attr("x1", item => item.source.x)
        .attr("y1", item => item.source.y)
        .attr("x2", item => item.target.x)
        .attr("y2", item => item.target.y);

      node.attr("transform", item => `translate(${item.x},${item.y})`);
    });
  }

  function isAttentionStarStatus(status) {
    const normalized = { quiet: "grace", notified: "alert" }[status] || status;
    return ["grace", "alert", "stale"].includes(normalized);
  }

  function getStarRoleLabel(role) {
    const labels = {
      self: "本人",
      guardian: "守护人",
      ward: "被我守护"

    return labels[role] || "联系人";
  }

  function buildStarActionMenu(item) {

    const actionsByRole = {
      self: [
        { label: "点亮生命球", subtitle: "刷新我的活跃状态", action: `handleLifeOrbTap(); closeSheet();` },
        { label: "进入保险柜", subtitle: "资料和密码远端加密存储", action: `goToPage('vault'); closeSheet();` },
        { label: "查看平安记录", subtitle: "最近脉搏和报平安记录", action: `goToPage('pulse'); closeSheet();` }
      ],
      guardian: [
        item.canCall ? { label: "拨打电话", subtitle: item.phone, action: `openStarCallAction('${item.id}')`, priority: urgent } : null,
        item.canMessage ? { label: "发送消息", subtitle: "发一条安好回音", action: `openStarMessageAction('${item.id}')` } : null,
        item.canViewVault ? { label: "查看资料", subtitle: item.vaultHint, action: `openStarVaultAction('${item.id}')`, priority: urgent } : { label: "资料不可见", subtitle: item.vaultHint, action: `showToast('该守护人无资料权限')` }
      ],
      ward: [
        { label: "查看脉搏", subtitle: item.activity, action: `openStarPulseAction('${item.id}')` },
        item.canCall ? { label: "拨打电话", subtitle: item.phone, action: `openStarCallAction('${item.id}')`, priority: urgent } : null,
        item.canViewVault ? { label: "查看资料", subtitle: item.vaultHint, action: `openStarVaultAction('${item.id}')`, priority: urgent } : null
      ]
    };

    return (actionsByRole[item.role] || actionsByRole.guardian)
      .filter(Boolean)
      .sort((left, right) => Number(Boolean(right.priority)) - Number(Boolean(left.priority)));

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");

  function getStarLegendMeta(status) {
    const descriptions = {
      veryActive: "近期活动频繁，状态饱满，是最稳定的守护信号。",
      normal: "一段时间内有活动记录，状态平稳，无需额外打扰。",
      grace: "已过设定时间，正在缓冲期内等待本人回应。",
      alert: "缓冲期已过，平安信已经传给守护人。",
      stale: "超过一日缺少活动，需要主动关注，但保险柜仍按规则封存。"
    };
    const meta = getStarStatusMeta(status);
    return {
      ...meta,
      status,
      description: descriptions[status] || descriptions.normal
    };
  }

    document.querySelectorAll(".star-status-dot").forEach(dot => {

  function submitPulse() {
    if (state.runbookStatus === "empty") {
      showToast("还没有正在运行的守护");
      return;
    }
    const pulseNote = document.getElementById("pulseNote");
    const note = pulseNote ? pulseNote.value.trim() : "";
    const nowStr = `今天 ${String(new Date().getHours()).padStart(2, "0")}:${String(new Date().getMinutes()).padStart(2, "0")}`;
    const desc = note ? `已报平安 · 附言："${note}"` : "已报平安，愿君安好";

    state.pulseRecords.unshift({ title: nowStr, desc: desc });
    state.runbookStatus = "active";
    state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 已报平安：${note || '日常安好'}`);
    
    if (pulseNote) pulseNote.value = "";
    clearInterval(state.countdownInterval);
    
    showToast("平安已报，愿君顺遂");
    renderAll();
    goToPage("home");
  }

  function noop() {}

  function beginSafeConfirmation() {
    if (state.runbookStatus === "empty") {
      startCreateFlow();
      return;
    }

    if (state.runbookStatus === "alert") {
      openResolveAlertSheet();
      return;
    }

    if (state.homeCeremony === "confirming") return;

    state.homeCeremony = "confirming";
    renderAll();
    triggerHaptic("success");
    setTimeout(confirmSafe, 680);
  }

  function resetHomeCeremonyLater() {
    clearTimeout(resetHomeCeremonyLater.timer);
    resetHomeCeremonyLater.timer = setTimeout(() => {
      if (state.homeCeremony === "confirmed") {
        state.homeCeremony = "idle";
        renderAll();
      }
    }, 1600);
  }

  function confirmSafe() {
    const now = new Date();
    const nowStr = `今天 ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    state.pulseRecords.unshift({ title: nowStr, desc: "已报平安，下一次吉时已更新" });
    if (state.pulseRecords.length > 5) state.pulseRecords.pop();

    recordActivityPulse("safe");
    state.activityScore = Math.max(state.activityScore, 64);
    updateRunbookStatusFromActivity();
    state.homeCeremony = "confirmed";
    clearInterval(state.countdownInterval);
    state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 已报平安，守护恢复如常`);
    showToast("平安已报，福气常在");
    goToPage("home");
    resetHomeCeremonyLater();
  }

  function snoozeCheckin() {
    state.countdownSeconds += 1800; // Delay by 30 minutes
    updateCountdownDisplay();
    showToast("已顺延半个时辰");
    goToPage("home");
  }

  function simulateGracePeriod() {
    if (!state.currentRunbook) {
      loadExampleRunbook();
    }
    state.activityScore = 38;
    updateRunbookStatusFromActivity();
    state.homeCeremony = "idle";
    state.countdownSeconds = Math.max(0, Number(state.currentRunbook?.bufferHours || 4) * 3600 - 2);
    state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 已进入报平安等候时限`);
    goToPage("home");
  }

  function simulateTimeoutTrigger() {
    if (!state.currentRunbook) {
      loadExampleRunbook();
    }
    state.activityScore = 20;
    updateRunbookStatusFromActivity();
    state.homeCeremony = "idle";
    state.recentLogs.unshift(`[${new Date().toLocaleTimeString()}] 久未报平安，平安信已传给守护人`);
    goToPage("home");
  }
